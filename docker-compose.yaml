version: '3.8'

services:
  abdm-wrapper:
    build: .
    image: abdm-wrapper
    ports:
      - '8082:8082'
    depends_on:
      - mongodb
    environment:
      - ABDM_CLIENT_ID=${ABDM_CLIENT_ID}
      - ABDM_CLIENT_SECRET=${ABDM_CLIENT_SECRET}
      - MONGODB_HOST=mongodb
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  mongodb:
    image: mongodb/mongodb-community-server:latest
    ports:
      - '27017:27017'
    volumes:
      - mongodb_vol:/data/db

volumes:
  mongodb_vol: