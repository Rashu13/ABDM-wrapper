version: '3.8'

services:
  abdm-wrapper:
    build: .
    image: abdm-wrapper
    ports:
      - '8082:8082'
    depends_on:
      - mongodb
    environment:
      - ABDM_CLIENT_ID=${ABDM_CLIENT_ID}
      - ABDM_CLIENT_SECRET=${ABDM_CLIENT_SECRET}
      - MONGODB_HOST=mongodb
    volumes:
      - records_vol:/app/records
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  fhir-mapper:
    build: 
      context: ./fhir-mapper
    image: fhir-mapper
    ports:
      - '8085:8085'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  sample-hip:
    build:
      context: sample-hip
      dockerfile: ./Dockerfile
    image: sample-hip
    ports:
      - '8081:8081'
    volumes:
      - /home/nhadmin/NHA/FHIR:/FHIR
      - records_vol:/app/records

  mongodb:
    image: mongodb/mongodb-community-server:latest
    ports:
      - '27017:27017'
    volumes:
      - mongodb_vol:/data/db

volumes:
  mongodb_vol:
  records_vol:
