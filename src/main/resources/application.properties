# sandbox = sbx, production = abdm
environment=sbx


# v1 or v3 version
spring.profiles.active=v3

#Credentials
clientId=${ABDM_CLIENT_ID:}
clientSecret=${ABDM_CLIENT_SECRET:}

# Logging of the outbound cUrl for debugging
logCurl=false

#MonogDb Connection
spring.datasource.driver-class-name=mongodb.jdbc.MongoDriver
spring.data.mongodb.host=${MONGODB_HOST:mongodb}
spring.data.mongodb.port=27017
spring.data.mongodb.database=abdm_wrapper


server.port=8082

#Proxy settings
useProxySettings=false
proxyHost=
proxyPort=8080

# <=============== READ ONLY ===============>
# LOGGER
logging.level.in.nha.abdm.wrapper=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.HttpEntityMethodProcessor=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=TRACE
logging.level.org.springframework.web.HttpLogging=TRACE

spring.task.scheduling.pool.size=10
connectionTimeout=3000
responseTimeout=5

spring.banner.location=classpath:banner.txt
# <===============================================>
recordsPath=./records
otpInternal=true

